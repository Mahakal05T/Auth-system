<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.animate-slideDown { animation: slideDown 0.3s ease; }
@keyframes slideDown { from { transform: translateY(-20px); opacity:0 } to { transform: translateY(0); opacity:1 } }
</style>
</head>

<body class="bg-gradient-to-br from-purple-700 via-indigo-700 to-blue-700 min-h-screen flex items-center justify-center p-4">

<!-- Login Card -->
<div class="bg-white/10 backdrop-blur-2xl border border-white/20 rounded-3xl shadow-2xl w-full max-w-md p-8 text-white space-y-6">

  <!-- Title -->
  <div class="text-center">
    <h2 class="text-3xl font-bold">Welcome Back</h2>
    <p class="text-gray-300 mt-1">Sign in to your account</p>
  </div>

  <!-- Single Login Form -->
  <form id="loginForm" class="flex flex-col gap-4 relative animate-slideDown">

    <!-- Identifier -->
    <input type="text" id="identifier" placeholder="Employee ID or Email" required
      class="bg-white/10 border border-white/20 rounded-lg px-4 py-2 w-full placeholder-gray-300 text-white focus:outline-none focus:ring-2 focus:ring-cyan-400">

    <!-- Error for identifier (created dynamically) -->
    <p id="identifierError" class="text-red-400 text-sm -mt-3 hidden"></p>

    <div class="relative">
      <input type="password" id="password" placeholder="Password" required
        class="bg-white/10 border border-white/20 rounded-lg px-4 py-2 w-full placeholder-gray-300 text-white focus:outline-none focus:ring-2 focus:ring-cyan-400">
      <button type="button" id="togglePassword" class="absolute right-3 top-2 text-gray-300 hover:text-white text-lg">👁️</button>
    </div>

    <!-- Password error -->
    <p id="passwordError" class="text-red-400 text-sm -mt-3 hidden"></p>

    <div class="flex items-center justify-between text-sm">
      <label class="flex items-center gap-2 text-gray-300">
        <input type="checkbox" class="accent-cyan-400"> Remember me
      </label>
      <a href="{{ url_for('forgot_password') }}" class="text-cyan-300 hover:underline">Forgot password?</a>
    </div>

    <button type="submit"
      class="bg-gradient-to-r from-cyan-400 to-blue-500 text-white font-semibold py-2 rounded-lg hover:from-cyan-500 hover:to-blue-600 shadow-lg transition">Login</button>

    <div class="flex items-center gap-2 text-sm text-gray-400 mt-2">
      <div class="flex-1 border-t border-gray-500"></div>
      <span>or continue with</span>
      <div class="flex-1 border-t border-gray-500"></div>
    </div>

    <div class="flex justify-center gap-3">
      <button type="button" class="w-1/2 bg-white/10 hover:bg-white/20 text-gray-200 font-medium rounded-lg py-2 flex items-center justify-center gap-2">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5"> Google
      </button>
      <button type="button" class="w-1/2 bg-white/10 hover:bg-white/20 text-gray-200 font-medium rounded-lg py-2 flex items-center justify-center gap-2">
        <img src="https://www.svgrepo.com/show/349375/github.svg" alt="GitHub" class="w-5 h-5 invert"> GitHub
      </button>
    </div>

    <p class="text-center text-sm text-gray-300">
      Don’t have an account?
      <a href="{{ url_for('register_user') }}" class="text-cyan-400 hover:underline font-medium">Sign up</a>
    </p>
  </form>
</div>

<!-- Toast + Spinner -->
<div id="toast-container" class="fixed top-4 right-4 space-y-2 z-50"></div>
<div id="loading-spinner" class="hidden fixed inset-0 bg-black bg-opacity-25 flex items-center justify-center z-50">
  <div class="w-12 h-12 border-4 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
</div>

<!-- ✅ JavaScript -->
<script>
// Inputs
const idInput = document.getElementById("identifier");
const passInput = document.getElementById("password");

// Error elements
const idErr = document.getElementById("identifierError");
const passErr = document.getElementById("passwordError");

// Reset errors
function clearErrors() {
  idInput.classList.remove("border-red-500");
  passInput.classList.remove("border-red-500");
  idErr.classList.add("hidden");
  passErr.classList.add("hidden");
}

idInput.addEventListener("input", clearErrors);
passInput.addEventListener("input", clearErrors);

// Toast Notification
function showToast(message, type = "success") {
  const toast = document.createElement("div");
  toast.className = `px-4 py-2 rounded shadow text-white ${
    type === "error" ? "bg-red-500" : "bg-green-500"
  } animate-slideDown`;
  toast.textContent = message;
  document.getElementById("toast-container").appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

// Password toggle
document.getElementById("togglePassword").addEventListener("click", () => {
  if (passInput.type === "password") {
    passInput.type = "text";
    togglePassword.textContent = "🙈";
  } else {
    passInput.type = "password";
    togglePassword.textContent = "👁️";
  }
});

// Read CSRF token from cookie (set by flask-jwt-extended)
function getCsrfToken() {
  const match = document.cookie.match(new RegExp('(^| )csrf_access_token=([^;]+)'));
  return match ? match[2] : null;
}

// MAIN LOGIN FUNCTION
async function handleLogin(identifier, password) {
  clearErrors();
  document.getElementById("loading-spinner").classList.remove("hidden");

  try {
    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ identifier, password })
    });

    const data = await res.json().catch(() => ({}));
    document.getElementById("loading-spinner").classList.add("hidden");

    // ===========================
    // ERROR HANDLING (FIXED)
    // ===========================
    if (res.status === 401) {
      // Unified error — don't reveal whether user exists or password is wrong
      passInput.classList.add("border-red-500");
      passErr.textContent = data.error || "Invalid credentials";
      passErr.classList.remove("hidden");
      return;
    }

    if (res.status === 403) {
      // Account deactivated
      showToast(data.error || "Account deactivated", "error");
      return;
    }

    // Other failure
    if (!res.ok) {
      showToast(data.error || "Login failed", "error");
      return;
    }

    // ===========================
    // SUCCESS LOGIN
    // ===========================
    showToast(data.message, "success");

    // Tokens are set as HttpOnly cookies by the server — no manual cookie setting needed

    setTimeout(() => {
      window.location.href = data.redirect;
    }, 900);

  } catch (e) {
    document.getElementById("loading-spinner").classList.add("hidden");
    showToast("Server error", "error");
  }
}

// Submit handler
document.getElementById("loginForm").addEventListener("submit", (e) => {
  e.preventDefault();
  handleLogin(idInput.value, passInput.value);
});
</script>


</body>
</html>
